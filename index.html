<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css"> <!-- Assuming we have a stylesheet for styles -->
    <title>Model Marshal v1.0.0</title>
</head>
<body>
    <header>
        <h1>Model Marshal v1.0.0</h1>
        <form id="queryForm">
            <label for="apiKey">API Key:</label>
            <input type="text" id="apiKey" required>
            <label for="query">Query:</label>
            <textarea id="query" required></textarea>
            <button type="submit">Dispatch to Models</button>
        </form>
        <div id="status"></div>
    </header>
    <div id="output"></div>
    <script src="script.js"></script>
</body>
</html>
